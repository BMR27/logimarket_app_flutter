name: logimarket_app
description: "Logimarket Delivery App - Flutter (Android + iOS)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  mobile_scanner: ^7.2.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2
  lottie: ^3.1.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  intl: ^0.20.2
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  signature: ^5.5.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
